# nginx config for fair single-process comparison vs xlang epoll server.
# worker_processes 1 = one process running one epoll loop, same model as
# server_epoll.x. Listens on 28090, returns a 5-byte "hello" body.
worker_processes 1;
events {
    worker_connections 10240;
}
http {
    access_log off;
    keepalive_timeout 65s;
    server {
        listen 28090;
        location / {
            return 200 "hello";
        }
    }
}
