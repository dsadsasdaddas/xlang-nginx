# nginx config to serve the SAME webroot as xlang server_web, for fair
# file-serving comparison. worker_processes 1 (single epoll loop, same model).
worker_processes 1;
events {
    worker_connections 65535;
}
http {
    access_log off;
    keepalive_timeout 65s;
    keepalive_requests 1000000;
    server {
        listen 28091;
        root /home/wzu/webroot;
        location / {
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
