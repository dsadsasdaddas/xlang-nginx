# nginx serving a real static file (sendfile, zero-copy) — the realistic
# counterpart to xlang's read_file+send. Serves ~/payload.txt.
pid /tmp/nx.pid;
error_log /tmp/nx_err.log warn;
events { worker_connections 1024; }
http {
    access_log off;
    sendfile on;
    server {
        listen 28081;
        location / { root /home/wzu; try_files /payload.txt =404; }
    }
}
