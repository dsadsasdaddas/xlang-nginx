# Standalone nginx returning the SAME fixed response as the xlang server
# ("hello") via `return` (hardcoded, no file I/O) — apples-to-apples. Run:
#   nginx -c $(pwd)/bench/nginx.conf -p /tmp/nxprefix/
pid /tmp/nx.pid;
error_log /tmp/nx_err.log warn;
events { worker_connections 1024; }
http {
    access_log off;
    server {
        listen 28081;
        location / { return 200 "hello"; }
    }
}
