name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  servers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout xlang-nginx
        uses: actions/checkout@v4

      - name: Clone xlang compiler
        run: git clone --depth 1 https://github.com/dsadsasdaddas/xlang /tmp/xlang

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build xlangc
        run: cargo build --release
        working-directory: /tmp/xlang

      # Compile every server (.x -> C) and cc it to an object. The networking
      # preamble (epoll/sendfile/...) is active on Linux, so this is a real
      # compile check. Servers are event loops (run forever) so we don't run them.
      - name: Compile every server (.x -> C -> object)
        run: |
          set -e
          XLANGC=/tmp/xlang/target/release/xlangc
          mkdir -p build
          pass=0
          for f in servers/*.x; do
            stem=$(basename "$f" .x)
            "$XLANGC" c "$f"
            cc -O2 -c "build/$stem.c" -o "build/$stem.o"
            pass=$((pass + 1))
          done
          echo "::notice::compiled $pass servers (.x -> C -> object) OK"

      - name: Compile the C load generator
        run: cc -O2 -c bench/loadgen.c -o build/loadgen.o

      # Functional test: build server_http, start it, curl it, verify the
      # response. The first RUNTIME CI test for the nginx replacement.
      - name: Functional test - server_http (build, start, curl, verify)
        run: |
          set -e
          XLANGC=/tmp/xlang/target/release/xlangc
          "$XLANGC" c servers/server_http.x
          cc -O2 -o /tmp/server_http build/server_http.c
          DOCDIR=$(mktemp -d)
          echo "hello from CI" > "$DOCDIR/index.html"
          /tmp/server_http "$DOCDIR" 28099 &
          SRV_PID=$!
          sleep 0.5
          # GET
          body=$(curl -s http://127.0.0.1:28099/index.html)
          [ "$body" = "hello from CI" ] || { echo "FAIL: body=[$body]"; kill $SRV_PID; exit 1; }
          # 404
          code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:28099/nonexistent)
          [ "$code" = "404" ] || { echo "FAIL: 404 code=$code"; kill $SRV_PID; exit 1; }
          # HEAD (status 200, zero body)
          head=$(curl -s -o /dev/null -w '%{http_code} %{size_download}' -I http://127.0.0.1:28099/index.html)
          echo "HEAD: $head"
          # POST upload (write body to a file), then GET it back — round-trip.
          post_body="uploaded content 12345"
          post_code=$(curl -s -o /dev/null -w '%{http_code}' -X POST --data "$post_body" http://127.0.0.1:28099/upload.txt)
          [ "$post_code" = "201" ] || { echo "FAIL: POST code=$post_code"; kill $SRV_PID; exit 1; }
          rb=$(curl -s http://127.0.0.1:28099/upload.txt)
          [ "$rb" = "$post_body" ] || { echo "FAIL: POST roundtrip body=[$rb]"; kill $SRV_PID; exit 1; }
          echo "POST upload + GET roundtrip OK"
          kill $SRV_PID
          rm -rf "$DOCDIR"
          echo "::notice::server_http functional test passed (GET + 404 + HEAD + POST)"

      # Functional test for the reverse proxy: start a backend, start the proxy,
      # curl through the proxy, verify the response is relayed.
      - name: Functional test - server_proxy (reverse proxy relay)
        run: |
          set -e
          XLANGC=/tmp/xlang/target/release/xlangc
          "$XLANGC" c servers/server_http.x; cc -O2 -o /tmp/be build/server_http.c
          "$XLANGC" c servers/server_proxy.x; cc -O2 -o /tmp/px build/server_proxy.c
          DOCDIR=$(mktemp -d)
          echo "via proxy" > "$DOCDIR/index.html"
          /tmp/be "$DOCDIR" 28110 &
          BE=$!
          /tmp/px 28120 4 127.0.0.1:28110 &
          PX=$!
          sleep 0.7
          body=$(curl -s http://127.0.0.1:28120/index.html)
          [ "$body" = "via proxy" ] || { echo "FAIL: body=[$body]"; kill $BE $PX; exit 1; }
          kill $BE $PX
          rm -rf "$DOCDIR"
          echo "::notice::server_proxy functional test passed (reverse proxy relay)"

      # Functional test for the vhost path-routing proxy: two backends, route
      # /api/* to one, / to the other. Verifies path-based dispatch.
      - name: Functional test - server_vhost (path routing)
        run: |
          set -e
          XLANGC=/tmp/xlang/target/release/xlangc
          "$XLANGC" c servers/server_http.x; cc -O2 -o /tmp/be build/server_http.c
          "$XLANGC" c servers/server_vhost.x; cc -O2 -o /tmp/vh build/server_vhost.c
          RA=$(mktemp -d); mkdir -p "$RA/api"
          echo "from-api" > "$RA/api/index.html"
          RB=$(mktemp -d)
          echo "from-root" > "$RB/index.html"
          /tmp/be "$RA" 28201 &
          BE1=$!
          /tmp/be "$RB" 28202 &
          BE2=$!
          /tmp/vh 28200 4 /api=127.0.0.1:28201 /=127.0.0.1:28202 &
          VH=$!
          sleep 0.7
          api=$(curl -s http://127.0.0.1:28200/api/index.html)
          [ "$api" = "from-api" ] || { echo "FAIL /api: [$api]"; kill $BE1 $BE2 $VH; exit 1; }
          root=$(curl -s http://127.0.0.1:28200/index.html)
          [ "$root" = "from-root" ] || { echo "FAIL /: [$root]"; kill $BE1 $BE2 $VH; exit 1; }
          kill $BE1 $BE2 $VH
          rm -rf "$RA" "$RB"
          echo "::notice::server_vhost functional test passed (path routing /api vs /)"
